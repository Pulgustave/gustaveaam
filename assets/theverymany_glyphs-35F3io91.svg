    <path d="M10,78 Q35,8 70,5 Q105,8 130,78" stroke="#ffffff" stroke-width="3.5" fill="none"/>
    <line x1="10" y1="78" x2="130" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <circle cx="70" cy="5" r="4" fill="#ffffff"/>
    <circle cx="10" cy="78" r="3" fill="#f0f0f0" opacity="0.8"/>
    <circle cx="130" cy="78" r="3" fill="#f0f0f0" opacity="0.8"/>
  </g>
</svg>
