<svg viewBox="-20 -20 320 216" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle tech-grid background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="-20" y="-20" width="320" height="216" fill="url(#grid)" />

  <!-- LV Milan -->
  <g transform="translate(0, 0)" filter="url(#glow)">
    <g opacity="0.4" stroke="#ffffff" stroke-width="1.5">
      <ellipse cx="30" cy="42" rx="18" ry="24"/>
      <ellipse cx="70" cy="36" rx="22" ry="28"/>
      <ellipse cx="110" cy="42" rx="18" ry="24"/>
      <line x1="15" y1="65" x2="10" y2="78"/>
      <line x1="30" y1="66" x2="30" y2="78"/>
      <line x1="45" y1="65" x2="50" y2="78"/>
      <line x1="53" y1="63" x2="48" y2="78"/>
      <line x1="70" y1="64" x2="70" y2="78"/>
      <line x1="87" y1="63" x2="92" y2="78"/>
      <line x1="95" y1="65" x2="90" y2="78"/>
      <line x1="110" y1="66" x2="110" y2="78"/>
      <line x1="125" y1="65" x2="130" y2="78"/>
    </g>
    <!-- foreground ellipses -->
    <ellipse cx="30" cy="40" rx="17" ry="23" stroke="#ffffff" stroke-width="2.5" opacity="0.8" fill="none"/>
    <ellipse cx="70" cy="34" rx="21" ry="27" stroke="#ffffff" stroke-width="4.0" fill="none"/>
    <ellipse cx="110" cy="40" rx="17" ry="23" stroke="#ffffff" stroke-width="2.5" opacity="0.8" fill="none"/>
    <!-- foreground legs -->
    <line x1="18" y1="63" x2="13" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="42" y1="63" x2="47" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="55" y1="61" x2="50" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="85" y1="61" x2="90" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="98" y1="63" x2="93" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="122" y1="63" x2="127" y2="78" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="10" y1="78" x2="130" y2="78" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Porsche Singapore -->
  <g transform="translate(140, 0)" filter="url(#glow)">
    <g opacity="0.4" stroke="#ffffff" stroke-width="1.5">
      <path d="M8,72 Q8,28 40,16 Q70,6 100,16 Q132,28 132,72"/>
      <path d="M18,72 Q18,36 44,26 Q70,18 96,26 Q122,36 122,72"/>
      <path d="M28,72 Q28,42 50,34 Q70,26 90,34 Q112,42 112,72"/>
      <line x1="8" y1="72" x2="132" y2="72"/>
      <line x1="12" y1="55" x2="128" y2="55"/>
      <line x1="20" y1="38" x2="120" y2="38"/>
      <line x1="36" y1="24" x2="104" y2="24"/>
    </g>
    <path d="M8,72 Q8,28 40,16 Q70,6 100,16 Q132,28 132,72" stroke="#ffffff" stroke-width="3.5" fill="none"/>
    <line x1="8" y1="72" x2="132" y2="72" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <rect x="22" y="52" width="38" height="20" stroke="#f0f0f0" stroke-width="2" opacity="0.8" fill="none"/>
    <rect x="80" y="52" width="38" height="20" stroke="#f0f0f0" stroke-width="2" opacity="0.8" fill="none"/>
    <line x1="8" y1="72" x2="8" y2="78" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
    <line x1="132" y1="72" x2="132" y2="78" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  </g>
  <!-- LV Heathrow -->
  <g transform="translate(70, 88)" filter="url(#glow)">
    <g opacity="0.4" stroke="#ffffff" stroke-width="1.5">
      <path d="M10,78 Q35,10 70,6 Q105,10 130,78"/>
      <path d="M20,78 Q40,22 70,18 Q100,22 120,78"/>
      <path d="M30,78 Q48,34 70,30 Q92,34 110,78"/>
